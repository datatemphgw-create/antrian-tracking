<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tracking Antrian</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f5f7fa;
}

.card{
    max-width:500px;
    margin:50px auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    text-align:center;
}

.nomor{
    font-size:48px;
    font-weight:bold;
    margin-bottom:20px;
}

.status{
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}

.waktu{
    color:#666;
    font-size:18px;
}

.selesai{
    color:#28a745;
}

.siap_diambil{
    color:#007bff;
}

.menunggu{
    color:#fd7e14;
}

.error{
    color:red;
}

</style>

</head>
<body>

<div class="card">

<div id="nomor" class="nomor">
Loading...
</div>

<div id="status" class="status">
...
</div>

<div id="waktu" class="waktu">
...
</div>

</div>

<script>

// QR menggunakan:
// ?id=A-001
// ?id=A-002

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadData(){

    try{

        const sheetID = "16iYxxNHNBgSmFCa7DZ8MFLTpvF5cZttXVB8yxp8VjXw";

        const url =
        `https://opensheet.elk.sh/${sheetID}/antrian`;

        const response = await fetch(url);
        const data = await response.json();

        console.log(data);

        const item = data.find(
            row => row["NO ANTRIAN"] === id
        );

        if(!item){

            document.getElementById("nomor").innerHTML =
            "Data Tidak Ditemukan";

            document.getElementById("status").innerHTML = "";

            document.getElementById("waktu").innerHTML = "";

            return;
        }

        document.getElementById("nomor").innerHTML =
        item["NO ANTRIAN"];

        const status =
        item["STATUS"];

        const statusElement =
        document.getElementById("status");

        statusElement.innerHTML =
        status.replace("_"," ");

        statusElement.className =
        "status " + status;

        document.getElementById("waktu").innerHTML =
        "Waktu Panggil : " +
        item["WAKTU PANGGIL"];

    }
    catch(err){

        console.error(err);

        document.getElementById("nomor").innerHTML =
        "ERROR";

        document.getElementById("status").innerHTML =
        "Gagal mengambil data";

    }

}

loadData();

// refresh tiap 3 detik
setInterval(loadData,3000);

</script>

</body>
</html>
