<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tracking Antrian</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background-image:url('https://datatemphgw-create.github.io/antrian-tracking/hermina_gold_3.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.card{
    max-width:500px;
    margin:50px auto;
    background:radial-gradient(circle at 0 115px, transparent 15px, white 16px) top left / 50% 100% no-repeat,
               radial-gradient(circle at 100% 115px, transparent 15px, white 16px) top right / 50% 100% no-repeat;
    border-radius:15px;
    padding:30px;
    filter:drop-shadow(0 5px 20px rgba(0,0,0,.1));
    text-align:center;
}

.kop{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin:0 -15px 30px -15px;
    padding-bottom:25px;
    border-bottom:2px dashed #ccc;
}

.kop img{
    width:60px;
}

.kop h2{
    margin:0;
    font-size:24px;
    color:#2e7d32;
}

.nomor{
    font-size:48px;
    font-weight:bold;
    margin-bottom:20px;
}

.status{
    font-size:18px;
    margin-bottom:15px;
    text-transform:capitalize;
}

.waktu{
    color:#666;
    font-size:12px;
}

.selesai{
    color:#28a745;
}

.siap_diambil{
    color:#007bff;
}

.menunggu{
    color:#fd7e14;
}

.error{
    color:red;
}

.footer{
    position:fixed;
    bottom:20px;
    left:0;
    width:100%;
    text-align:center;
    font-size:14px;
    color:#555;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="card">

<div class="kop">
    <img src="https://datatemphgw-create.github.io/antrian-tracking/192x192.png" alt="Logo Hermina">
    <h2>Tracking Antrian</h2>
</div>

<div id="nomor" class="nomor">
Loading...
</div>

<div id="status" class="status">
...
</div>

<div id="waktu" class="waktu">
...
</div>

</div>

<div class="footer">
    Developed by IT RS Hermina Grand Wisata
</div>

<script>

// QR menggunakan:
// ?id=A-001
// ?id=A-002

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadData(){

    try{

        const sheetID = "16iYxxNHNBgSmFCa7DZ8MFLTpvF5cZttXVB8yxp8VjXw";

        const url =
        `https://opensheet.elk.sh/${sheetID}/antrian`;

        const response = await fetch(url);
        const data = await response.json();

        console.log(data);

        const item = data.find(
            row => row["NO ANTRIAN"] === id
        );

        if(!item){

            document.getElementById("nomor").innerHTML =
            "Data Tidak Ditemukan";

            document.getElementById("status").innerHTML = "";

            document.getElementById("waktu").innerHTML = "";

            return;
        }

        document.getElementById("nomor").innerHTML =
        item["NO ANTRIAN"];

        const status =
        item["STATUS"];

        const statusElement =
        document.getElementById("status");

        let statusText = status.replace(/_/g," ");

        if (statusText.toLowerCase() === "menunggu pembayaran") {
            statusText = "menunggu proses kasir";
        } else if (statusText.toLowerCase() === "proses") {
            statusText = "obat sedang diproses";
        }

        statusElement.innerHTML = statusText;

        statusElement.className =
        "status " + status;

        if (item["WAKTU PANGGIL"] && item["WAKTU PANGGIL"] !== "null" && String(item["WAKTU PANGGIL"]).trim() !== "") {
            document.getElementById("waktu").innerHTML =
            "Dipanggil : " + item["WAKTU PANGGIL"];
        } else {
            document.getElementById("waktu").innerHTML = "";
        }

    }
    catch(err){

        console.error(err);

        document.getElementById("nomor").innerHTML =
        "ERROR";

        document.getElementById("status").innerHTML =
        "Gagal mengambil data";

    }

}

loadData();

// refresh tiap 3 detik
setInterval(loadData,1000);

</script>

</body>
</html>
