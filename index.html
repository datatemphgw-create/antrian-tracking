<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tracking Antrian</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:50px;
    background:#f5f5f5;
}

.card{
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.status{
    font-size:30px;
    font-weight:bold;
    color:green;
}

.error{
    color:red;
}
</style>

</head>
<body>

<div class="card">

    <h1 id="nomor">Loading...</h1>

    <div class="status" id="status">
        ...
    </div>

    <p id="loket"></p>

</div>

<script>

// Ambil parameter id dari URL
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

async function loadData() {

    const sheetID = '16iYxxNHNBgSmFCa7DZ8MFLTpvF5cZttXVB8yxp8VjXw';

    // Ganti Sheet1 jika nama sheet berbeda
    const url = `https://opensheet.elk.sh/${sheetID}/Sheet1`;

    try {

        const res = await fetch(url);

        if (!res.ok) {
            throw new Error("Gagal mengambil data");
        }

        const data = await res.json();

        console.log("ID URL:", id);
        console.log("Data Sheet:", data);

        const item = data.find(row => row.kode == id);

        if (item) {

            document.getElementById('nomor').innerHTML =
                'Nomor ' + item.nomor;

            document.getElementById('status').innerHTML =
                item.status;

            document.getElementById('loket').innerHTML =
                'Loket : ' + item.loket;

        } else {

            document.getElementById('nomor').innerHTML =
                'Data Tidak Ditemukan';

            document.getElementById('status').innerHTML =
                '-';

            document.getElementById('loket').innerHTML =
                '';

        }

    } catch (err) {

        console.error(err);

        document.getElementById('nomor').innerHTML =
            'Gagal Memuat Data';

        document.getElementById('status').innerHTML =
            'ERROR';

        document.getElementById('status').classList.add('error');

        document.getElementById('loket').innerHTML =
            err.message;

    }
}

// Jalankan pertama kali
loadData();

// Refresh otomatis tiap 3 detik
setInterval(loadData, 3000);

</script>

</body>
</html>
