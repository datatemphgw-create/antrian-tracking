<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tracking Antrian</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.card{
    background:white;
    border-radius:15px;
    padding:25px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.nomor{
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

.status{
    font-size:28px;
    font-weight:bold;
    margin:15px 0;
}

.waktu{
    color:#666;
    font-size:18px;
}

.success{
    color:green;
}

.waiting{
    color:orange;
}

.called{
    color:blue;
}

.error{
    color:red;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<div id="nomor" class="nomor">
Loading...
</div>

<div id="status" class="status">
...
</div>

<div id="waktu" class="waktu">
...
</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const noAntrian = params.get("no");

async function loadData(){

    try{

        const sheetID = "antrian";

        const url =
        `https://opensheet.elk.sh/${sheetID}/antrian`;

        const response = await fetch(url);

        const data = await response.json();

        const item = data.find(
            row => row["NO ANTRIAN"] === noAntrian
        );

        if(!item){

            document.getElementById("nomor").innerHTML =
            "Data Tidak Ditemukan";

            document.getElementById("status").innerHTML =
            "";

            document.getElementById("waktu").innerHTML =
            "";

            return;
        }

        document.getElementById("nomor").innerHTML =
        item["NO ANTRIAN"];

        let status = item["STATUS"];

        document.getElementById("status").innerHTML =
        status;

        document.getElementById("waktu").innerHTML =
        "Waktu : " + item["WAKTU PANGGIL"];

        const statusElement =
        document.getElementById("status");

        statusElement.className = "status";

        switch(status){

            case "selesai":
                statusElement.classList.add("success");
                break;

            case "siap_diambil":
                statusElement.classList.add("called");
                break;

            default:
                statusElement.classList.add("waiting");
        }

    }
    catch(err){

        document.getElementById("status").innerHTML =
        "Gagal mengambil data";

        console.error(err);

    }

}

loadData();

setInterval(loadData,3000);

</script>

</body>
</html>
