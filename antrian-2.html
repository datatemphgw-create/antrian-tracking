<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tracking Antrian</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background-image:url('https://datatemphgw-create.github.io/antrian-tracking/hermina_gold_3.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.card{
    max-width:500px;
    margin:50px auto;
    background:radial-gradient(circle at 0 115px, transparent 15px, white 16px) top left / 50% 100% no-repeat,
               radial-gradient(circle at 100% 115px, transparent 15px, white 16px) top right / 50% 100% no-repeat;
    border-radius:15px;
    padding:30px;
    filter:drop-shadow(0 5px 20px rgba(0,0,0,.1));
    text-align:center;
}

.kop{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin:0 -15px 30px -15px;
    padding-bottom:25px;
    border-bottom:2px dashed #ccc;
}

.kop img{
    width:60px;
}

.kop h2{
    margin:0;
    font-size:24px;
    color:#2e7d32;
}

.ticket-body{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
}

.status-waktu{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    text-align:right;
}

.nomor{
    font-size:30px;
    font-weight:bold;
}

.status{
    font-size:18px;
    margin-bottom:5px;
    text-transform:capitalize;
}

.waktu{
    color:#666;
    font-size:12px;
}

.selesai{
    color:#28a745;
}

.siap_diambil{
    color:#007bff;
}

.menunggu{
    color:#fd7e14;
}

.error{
    color:red;
}

.footer{
    position:fixed;
    bottom:20px;
    left:0;
    width:100%;
    text-align:center;
    font-size:14px;
    color:#555;
    font-weight:bold;
}

/* Popup styles */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease;
}

.popup-overlay.show {
    opacity: 1;
    visibility: visible;
}

.popup-content {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    transform: scale(0.8);
    transition: transform 0.3s ease;
    max-width: 80%;
}

.popup-overlay.show .popup-content {
    transform: scale(1);
}

.popup-content h3 {
    margin-top: 0;
    color: #2e7d32;
    font-size: 24px;
}

.popup-content p {
    font-size: 18px;
    color: #333;
}

.popup-content button {
    margin-top: 20px;
    padding: 10px 20px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

.popup-content button:hover {
    background: #1b5e20;
}

</style>

</head>
<body>

<div class="popup-overlay" id="popupOverlay">
    <div class="popup-content">
        <h3>Panggilan Antrian</h3>
        <p>Nomor antrian <strong id="popupNomor"></strong> sedang dipanggil.</p>
        <button onclick="closePopup()">Tutup</button>
    </div>
</div>

<audio id="notificationSound" src="https://datatemphgw-create.github.io/antrian-tracking/notification.mp3" preload="auto"></audio>

<div class="card">

<div class="kop">
    <img src="https://datatemphgw-create.github.io/antrian-tracking/192x192.png" alt="Logo Hermina">
    <h2>Tracking Antrian</h2>
</div>

<div class="ticket-body">
    <div id="nomor" class="nomor">
    Loading...
    </div>

    <div class="status-waktu">
        <div id="status" class="status">
        ...
        </div>

        <div id="waktu" class="waktu">
        ...
        </div>
    </div>
</div>

</div>

<div class="footer">
    Developed by IT RS Hermina Grand Wisata
</div>

<script>

// QR menggunakan:
// ?id=A-001
// ?id=A-002

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let lastWaktuPanggil = null;
let isInitialLoad = true;

async function loadData(){

    try{

        const url = "https://script.google.com/macros/s/AKfycbzLYz2KWzjB3UkAE85CUaFJuUvWyMUGCuftqSgi7MMOUVpbaEdXae-UHibrA2zjPLBrQA/exec?endpoint=antrian2";

        const response = await fetch(url);
        const data = await response.json();

        console.log(data);

        const item = data.find(
            (row, index) => index > 0 && row[0] === id
        );

        if(!item){

            document.getElementById("nomor").innerHTML =
            "Data Tidak Ditemukan";

            document.getElementById("status").innerHTML = "";

            document.getElementById("waktu").innerHTML = "";

            return;
        }

        document.getElementById("nomor").innerHTML =
        item[0];

        const status =
        item[1];

        const statusElement =
        document.getElementById("status");

        let statusText = status.replace(/_/g," ");

        if (statusText.toLowerCase() === "menunggu") {
            statusText = "menunggu panggilan";
        } else if (statusText.toLowerCase() === "menunggu pembayaran") {
            statusText = "proses kasir";
        } else if (statusText.toLowerCase() === "proses") {
            statusText = "obat diproses";
        }

        statusElement.innerHTML = statusText;

        statusElement.className =
        "status " + status;

        if (item[2] && item[2] !== "null" && item[2] !== "-" && String(item[2]).trim() !== "") {
            document.getElementById("waktu").innerHTML =
            "Dipanggil : " + item[2];
            
            if (!isInitialLoad && lastWaktuPanggil !== item[2]) {
                showPopup(item[0]);
                playNotification();
            }
            
            lastWaktuPanggil = item[2];
        } else {
            document.getElementById("waktu").innerHTML = "";
        }

        isInitialLoad = false;

    }
    catch(err){

        console.error(err);

        document.getElementById("nomor").innerHTML =
        "ERROR";

        document.getElementById("status").innerHTML =
        "Gagal mengambil data";

    }

}

function showPopup(nomor) {
    document.getElementById("popupNomor").innerText = nomor;
    document.getElementById("popupOverlay").classList.add("show");
}

function closePopup() {
    document.getElementById("popupOverlay").classList.remove("show");
}

function playNotification() {
    const audio = document.getElementById("notificationSound");
    audio.play().catch(e => console.warn("Autoplay audio tertahan oleh browser:", e));
}

loadData();

// refresh tiap 1 detik
setInterval(loadData,1000);

</script>

</body>
</html>
